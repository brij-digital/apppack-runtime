name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  check-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify version bump for runtime changes
        if: github.event_name == 'pull_request'
        run: |
          BASE_REF="${{ github.base_ref }}"
          CHANGED_FILES="$(git diff --name-only "origin/${BASE_REF}...HEAD")"
          if ! printf '%s\n' "$CHANGED_FILES" | grep -Eq '^(src/|test/|package\.json|tsconfig\.json)'; then
            exit 0
          fi
          if printf '%s\n' "$CHANGED_FILES" | grep -q '^package.json$'; then
            exit 0
          fi
          echo "Runtime source changed without a package.json version update."
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
